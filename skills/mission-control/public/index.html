<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission Control — Multi-Agent Dashboard v3.0</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Monaco', 'Courier New', monospace;
      background: linear-gradient(135deg, #0a0e27 0%, #16213e 100%);
      color: #e8e8e8;
      padding: 20px;
      min-height: 100vh;
    }
    
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 2px solid #00d4ff;
    }
    
    h1 {
      font-size: 28px;
      background: linear-gradient(90deg, #00d4ff, #00ffaa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .status-bar {
      display: flex;
      gap: 20px;
      align-items: center;
      font-size: 14px;
    }
    
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
    }
    
    .status-dot.healthy { background: #00ff00; }
    .status-dot.working { background: #00d4ff; }
    .status-dot.idle { background: #ffaa00; }
    .status-dot.error { background: #ff0055; }
    
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .pulse { animation: pulse 2s infinite; }
    
    /* Tabs */
    .tabs {
      display: flex;
      gap: 5px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    .tab {
      padding: 12px 20px;
      background: rgba(20, 35, 60, 0.8);
      border: 1px solid #00d4ff;
      color: #00d4ff;
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
      transition: all 0.2s;
    }
    
    .tab:hover { background: rgba(0, 212, 255, 0.1); }
    
    .tab.active {
      background: linear-gradient(135deg, #00d4ff 0%, #00ffaa 100%);
      color: #0a0e27;
      border-color: #00ffaa;
    }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    /* Common styles */
    .card {
      background: rgba(20, 35, 60, 0.8);
      border: 1px solid #00d4ff;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }
    
    .card-title {
      font-size: 14px;
      font-weight: bold;
      color: #00ffaa;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    
    .btn {
      padding: 8px 16px;
      border: 1px solid #00d4ff;
      background: rgba(0, 212, 255, 0.1);
      color: #00d4ff;
      cursor: pointer;
      font-size: 12px;
      border-radius: 4px;
    }
    
    .btn:hover { background: rgba(0, 212, 255, 0.2); }
    
    .btn-primary {
      background: linear-gradient(135deg, #00d4ff 0%, #00ffaa 100%);
      color: #0a0e27;
      border: none;
    }
    
    /* Status badges */
    .badge {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 10px;
      text-transform: uppercase;
      font-weight: bold;
    }
    
    .badge.high { background: #ff0055; }
    .badge.medium { background: #ffaa00; color: #0a0e27; }
    .badge.low { background: #00ffaa; color: #0a0e27; }
    
    .badge.todo { background: #888; }
    .badge.in_progress { background: #00d4ff; color: #0a0e27; }
    .badge.done { background: #00ff00; color: #0a0e27; }
    
    .badge.idea { background: #ff64ff; }
    .badge.script { background: #00d4ff; color: #0a0e27; }
    .badge.thumbnail { background: #ffaa00; color: #0a0e27; }
    .badge.filming { background: #ff6400; }
    .badge.done { background: #00ff00; color: #0a0e27; }
    
    /* Forms */
    input, select, textarea {
      width: 100%;
      padding: 10px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid #00d4ff;
      color: #e8e8e8;
      border-radius: 4px;
      margin-bottom: 10px;
      font-family: inherit;
    }
    
    /* Memory search */
    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .search-box input { flex: 1; margin-bottom: 0; }
    
    /* Team */
    .team-member {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      margin-bottom: 8px;
    }
    
    .team-avatar {
      font-size: 32px;
      width: 50px;
      text-align: center;
    }
    
    .team-info { flex: 1; }
    .team-name { font-weight: bold; color: #00ffaa; }
    .team-role { font-size: 12px; color: #888; }
    .team-status { font-size: 11px; }
    
    /* Office */
    .office-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    
    .workstation {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      border: 2px solid transparent;
    }
    
    .workstation.working { border-color: #00ff00; }
    .workstation.idle { border-color: #ffaa00; opacity: 0.6; }
    
    .station-icon { font-size: 40px; margin-bottom: 8px; }
    .station-name { font-weight: bold; color: #00d4ff; }
    .station-task { font-size: 11px; color: #888; margin-top: 8px; }
    .computer {
      width: 40px;
      height: 28px;
      background: #333;
      border-radius: 4px;
      margin: 8px auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .computer.on { background: #00ff00; box-shadow: 0 0 10px #00ff00; }
    .computer.off { background: #333; }
    
    /* Calendar */
    .calendar-event {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      margin-bottom: 8px;
      border-left: 3px solid #00d4ff;
    }
    
    .calendar-time {
      font-weight: bold;
      color: #00d4ff;
      min-width: 80px;
    }
    
    .calendar-recurring {
      font-size: 10px;
      background: #00ffaa;
      color: #0a0e27;
      padding: 2px 6px;
      border-radius: 4px;
    }
    
    /* Pipeline stages */
    .pipeline-stages {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    
    .stage {
      padding: 6px 12px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
    }
    
    .stage.active {
      background: #00d4ff;
      color: #0a0e27;
    }
    
    /* Memory */
    .memory-item {
      padding: 16px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      margin-bottom: 12px;
      border-left: 3px solid #00ffaa;
    }
    
    .memory-title { font-weight: bold; color: #00d4ff; margin-bottom: 8px; }
    .memory-content { font-size: 13px; line-height: 1.5; }
    .memory-meta { font-size: 11px; color: #888; margin-top: 8px; }
    
    .memory-item.correction { border-left-color: #ff0055; }
    .memory-item.system { border-left-color: #00d4ff; }
    .memory-item.discovery { border-left-color: #ffaa00; }
    .memory-item.learning { border-left-color: #00ff00; }
    
    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: #00d4ff;
    }
    
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #00d4ff;
      border-radius: 50%;
      border-top-color: #00ffaa;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <h1>🎯 MISSION CONTROL v3.0</h1>
    <div class="status-bar">
      <span><span class="status-dot healthy pulse"></span>System: Online</span>
      <span id="teamCount">Team: 0</span>
      <span id="taskCount">Active Tasks: 0</span>
    </div>
  </header>
  
  <div class="tabs">
    <button class="tab active" onclick="switchTab('command')">🏠 Command Center</button>
    <button class="tab" onclick="switchTab('tasks')">✅ Tasks Board</button>
    <button class="tab" onclick="switchTab('pipeline')">📺 Content Pipeline</button>
    <button class="tab" onclick="switchTab('calendar')">📅 Calendar</button>
    <button class="tab" onclick="switchTab('team')">👥 Team</button>
    <button class="tab" onclick="switchTab('office')">🏢 Office</button>
    <button class="tab" onclick="switchTab('memories')">🧠 Memory</button>
  </div>
  
  <!-- COMMAND CENTER -->
  <div id="command" class="tab-content active">
    <div class="grid" id="commandGrid">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>
  
  <!-- TASKS BOARD -->
  <div id="tasks" class="tab-content">
    <div style="margin-bottom: 20px;">
      <button class="btn btn-primary" onclick="showAddTask()">+ Add Task</button>
    </div>
    <div id="tasksBoard"></div>
  </div>
  
  <!-- CONTENT PIPELINE -->
  <div id="pipeline" class="tab-content">
    <div class="pipeline-stages">
      <span class="stage active" onclick="filterPipeline('all')">All</span>
      <span class="stage" onclick="filterPipeline('idea')">💡 Idea</span>
      <span class="stage" onclick="filterPipeline('script')">📝 Script</span>
      <span class="stage" onclick="filterPipeline('thumbnail')">🖼️ Thumbnail</span>
      <span class="stage" onclick="filterPipeline('filming')">🎬 Filming</span>
      <span class="stage" onclick="filterPipeline('done')">✅ Done</span>
    </div>
    <div class="grid" id="pipelineGrid"></div>
  </div>
  
  <!-- CALENDAR -->
  <div id="calendar" class="tab-content">
    <div style="margin-bottom: 20px;">
      <button class="btn btn-primary" onclick="showAddEvent()">+ Add Event</button>
    </div>
    <div id="calendarGrid"></div>
  </div>
  
  <!-- TEAM -->
  <div id="team" class="tab-content">
    <div id="teamGrid"></div>
  </div>
  
  <!-- OFFICE -->
  <div id="office" class="tab-content">
    <div class="office-grid" id="officeGrid"></div>
  </div>
  
  <!-- MEMORIES -->
  <div id="memories" class="tab-content">
    <div class="search-box">
      <input type="text" id="memorySearch" placeholder="Search memories..." onkeyup="searchMemories()">
      <button class="btn" onclick="searchMemories()">Search</button>
    </div>
    <div id="memoriesGrid"></div>
  </div>
  
  <script>
    let state = {};
    let ws = null;
    
    // Connect WebSocket
    function connect() {
      ws = new WebSocket(`ws://${location.host}/ws`);
      
      ws.onopen = () => console.log('[WS] Connected');
      
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'initial_state') {
          state = msg;
          renderAll();
        } else if (msg.type === 'tasks_board_update') {
          state.tasks_board = state.tasks_board || [];
          const idx = state.tasks_board.findIndex(t => t.id === msg.task.id);
          if (idx >= 0) state.tasks_board[idx] = msg.task;
          else state.tasks_board.push(msg.task);
          renderTasksBoard();
        } else if (msg.type === 'content_pipeline_update') {
          state.content_pipeline = state.content_pipeline || [];
          const idx = state.content_pipeline.findIndex(i => i.id === msg.item.id);
          if (idx >= 0) state.content_pipeline[idx] = msg.item;
          else state.content_pipeline.push(msg.item);
          renderPipeline();
        } else if (msg.type === 'team_update') {
          state.team = state.team || [];
          const idx = state.team.findIndex(t => t.id === msg.member.id);
          if (idx >= 0) state.team[idx] = msg.member;
          else state.team.push(msg.member);
          renderTeam();
        } else if (msg.type === 'office_update') {
          state.office = state.office || [];
          const idx = state.office.findIndex(o => o.id === msg.station.id);
          if (idx >= 0) state.office[idx] = msg.station;
          else state.office.push(msg.station);
          renderOffice();
        } else if (msg.type === 'memory_update') {
          state.memories = state.memories || [];
          state.memories.unshift(msg.memory);
          renderMemories();
        }
      };
      
      ws.onclose = () => setTimeout(connect, 3000);
    }
    
    // Load initial data
    async function loadData() {
      const [status, tasksBoard, pipeline, calendar, team, office, memories] = await Promise.all([
        fetch('/api/status').then(r => r.json()),
        fetch('/api/tasks-board').then(r => r.json()),
        fetch('/api/content-pipeline').then(r => r.json()),
        fetch('/api/calendar').then(r => r.json()),
        fetch('/api/team').then(r => r.json()),
        fetch('/api/office').then(r => r.json()),
        fetch('/api/memories').then(r => r.json())
      ]);
      
      state = { ...state, ...status, tasks_board: tasksBoard.tasks, content_pipeline: pipeline.pipeline, calendar: calendar.events, team: team.team, office: office.office, memories: memories.memories };
      renderAll();
    }
    
    function renderAll() {
      renderCommandCenter();
      renderTasksBoard();
      renderPipeline();
      renderCalendar();
      renderTeam();
      renderOffice();
      renderMemories();
      
      document.getElementById('teamCount').textContent = `Team: ${(state.team || []).length}`;
      document.getElementById('taskCount').textContent = `Active Tasks: ${(state.tasks_board || []).filter(t => t.status === 'in_progress').length}`;
    }
    
    // Command Center
    function renderCommandCenter() {
      const grid = document.getElementById('commandGrid');
      const team = state.team || [];
      
      grid.innerHTML = `
        <div class="card">
          <div class="card-title">🎯 SYSTEM STATUS</div>
          <div style="font-size: 12px;">
            <div>Uptime: ${formatUptime(state.uptime)}</div>
            <div>Team Active: ${team.filter(t => t.status === 'working').length}/${team.length}</div>
            <div>Tasks In Progress: ${(state.tasks_board || []).filter(t => t.status === 'in_progress').length}</div>
          </div>
        </div>
      `;
      
      team.forEach(member => {
        grid.innerHTML += `
          <div class="card">
            <div class="card-title">${member.avatar} ${member.name}</div>
            <div style="font-size: 12px;">
              <div><span class="status-dot ${member.status === 'working' ? 'working' : 'idle'}"></span>${member.status.toUpperCase()}</div>
              <div>Role: ${member.role}</div>
              <div>Manager: ${member.manager}</div>
            </div>
          </div>
        `;
      });
    }
    
    // Tasks Board
    function renderTasksBoard() {
      const container = document.getElementById('tasksBoard');
      const tasks = state.tasks_board || [];
      
      if (tasks.length === 0) {
        container.innerHTML = '<p style="color:#888">No tasks yet. Add one!</p>';
        return;
      }
      
      container.innerHTML = tasks.map(task => `
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:start;">
            <div>
              <div style="font-weight:bold;color:#00ffaa;">${task.title}</div>
              <div style="font-size:11px;color:#888;margin-top:4px;">Owner: ${task.owner}</div>
            </div>
            <span class="badge ${task.status}">${task.status.replace('_', ' ')}</span>
          </div>
          <div style="margin-top:8px;display:flex;gap:8px;">
            <span class="badge ${task.priority}">${task.priority}</span>
            <select onchange="updateTask('${task.id}', 'status', this.value)" style="width:auto;padding:4px;margin:0;">
              <option value="todo" ${task.status === 'todo' ? 'selected' : ''}>Todo</option>
              <option value="in_progress" ${task.status === 'in_progress' ? 'selected' : ''}>In Progress</option>
              <option value="done" ${task.status === 'done' ? 'selected' : ''}>Done</option>
            </select>
          </div>
        </div>
      `).join('');
    }
    
    function updateTask(id, field, value) {
      fetch(`/api/tasks-board/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ [field]: value })
      });
    }
    
    function showAddTask() {
      const title = prompt('Task title:');
      if (title) {
        fetch('/api/tasks-board', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, status: 'todo', owner: 'James', priority: 'medium' })
        });
      }
    }
    
    // Content Pipeline
    let currentPipelineFilter = 'all';
    
    function filterPipeline(stage) {
      currentPipelineFilter = stage;
      document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
      event.target.classList.add('active');
      renderPipeline();
    }
    
    function renderPipeline() {
      const container = document.getElementById('pipelineGrid');
      let items = state.content_pipeline || [];
      
      if (currentPipelineFilter !== 'all') {
        items = items.filter(i => i.stage === currentPipelineFilter);
      }
      
      if (items.length === 0) {
        container.innerHTML = '<p style="color:#888">No content in pipeline.</p>';
        return;
      }
      
      container.innerHTML = items.map(item => `
        <div class="card">
          <div class="card-title">${item.title}</div>
          <span class="badge ${item.stage}">${item.stage}</span>
          <div style="font-size:11px;color:#888;margin-top:8px;">
            Platform: ${item.platform} | Assignee: ${item.assignee}
          </div>
          <select onchange="updatePipeline('${item.id}', 'stage', this.value)" style="width:auto;padding:4px;margin-top:8px;">
            <option value="idea" ${item.stage === 'idea' ? 'selected' : ''}>Idea</option>
            <option value="script" ${item.stage === 'script' ? 'selected' : ''}>Script</option>
            <option value="thumbnail" ${item.stage === 'thumbnail' ? 'selected' : ''}>Thumbnail</option>
            <option value="filming" ${item.stage === 'filming' ? 'selected' : ''}>Filming</option>
            <option value="done" ${item.stage === 'done' ? 'selected' : ''}>Done</option>
          </select>
        </div>
      `).join('');
    }
    
    function updatePipeline(id, field, value) {
      fetch(`/api/content-pipeline/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ [field]: value })
      });
    }
    
    // Calendar
    function renderCalendar() {
      const container = document.getElementById('calendarGrid');
      const events = state.calendar || [];
      
      if (events.length === 0) {
        container.innerHTML = '<p style="color:#888">No calendar events.</p>';
        return;
      }
      
      container.innerHTML = events.map(event => `
        <div class="calendar-event">
          <div class="calendar-time">${formatDate(event.time)}</div>
          <div style="flex:1;">
            <div style="font-weight:bold;">${event.title}</div>
            <div style="font-size:11px;color:#888;">${event.owner !== 'all' ? 'Owner: ' + event.owner : ''}</div>
          </div>
          ${event.type === 'recurring' ? '<span class="calendar-recurring">RECURRING</span>' : ''}
        </div>
      `).join('');
    }
    
    function showAddEvent() {
      const title = prompt('Event title:');
      const time = prompt('Time (ISO format, e.g. 2026-02-20T09:00:00Z):');
      if (title && time) {
        fetch('/api/calendar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, time, type: 'one-time', owner: 'James' })
        });
      }
    }
    
    // Team
    function renderTeam() {
      const container = document.getElementById('teamGrid');
      const team = state.team || [];
      
      container.innerHTML = team.map(member => `
        <div class="team-member">
          <div class="team-avatar">${member.avatar}</div>
          <div class="team-info">
            <div class="team-name">${member.name}</div>
            <div class="team-role">${member.role}</div>
            <div class="team-status"><span class="status-dot ${member.status === 'working' ? 'working' : 'idle'}"></span>${member.status}</div>
          </div>
          <div style="text-align:right;">
            <select onchange="updateTeam('${member.id}', 'status', this.value)" style="width:auto;padding:4px;">
              <option value="working" ${member.status === 'working' ? 'selected' : ''}>Working</option>
              <option value="idle" ${member.status === 'idle' ? 'selected' : ''}>Idle</option>
            </select>
          </div>
        </div>
      `).join('');
    }
    
    function updateTeam(id, field, value) {
      fetch(`/api/team/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ [field]: value })
      });
    }
    
    // Office
    function renderOffice() {
      const container = document.getElementById('officeGrid');
      const office = state.office || [];
      
      container.innerHTML = office.map(station => `
        <div class="workstation ${station.status}">
          <div class="station-icon">🖥️</div>
          <div class="station-name">${station.id}</div>
          <div class="computer ${station.computer_on ? 'on' : 'off'}"></div>
          <div class="station-task">${station.current_task || 'Idle'}</div>
          <select onchange="updateOffice('${station.id}', 'status', this.value)" style="width:auto;padding:4px;margin-top:8px;">
            <option value="working" ${station.status === 'working' ? 'selected' : ''}>Working</option>
            <option value="idle" ${station.status === 'idle' ? 'selected' : ''}>Idle</option>
          </select>
        </div>
      `).join('');
    }
    
    function updateOffice(id, field, value) {
      fetch(`/api/office/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          [field]: value,
          computer_on: value === 'working'
        })
      });
    }
    
    // Memories
    function renderMemories() {
      const container = document.getElementById('memoriesGrid');
      const memories = state.memories || [];
      
      if (memories.length === 0) {
        container.innerHTML = '<p style="color:#888">No memories yet.</p>';
        return;
      }
      
      container.innerHTML = memories.map(mem => `
        <div class="memory-item ${mem.type}">
          <div class="memory-title">${mem.title}</div>
          <div class="memory-content">${mem.content}</div>
          <div class="memory-meta">${new Date(mem.timestamp).toLocaleString()} | ${mem.type}</div>
        </div>
      `).join('');
    }
    
    function searchMemories() {
      const query = document.getElementById('memorySearch').value;
      fetch(`/api/memories${query ? '?q=' + encodeURIComponent(query) : ''}`)
        .then(r => r.json())
        .then(data => {
          state.memories = data.memories;
          renderMemories();
        });
    }
    
    // Utils
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
      document.getElementById(tab).classList.add('active');
    }
    
    function formatUptime(ms) {
      if (!ms) return '--';
      const seconds = Math.floor(ms / 1000);
      const minutes = Math.floor(seconds / 60);
      const hours = Math.floor(minutes / 60);
      const days = Math.floor(hours / 24);
      if (days > 0) return `${days}d ${hours % 24}h`;
      if (hours > 0) return `${hours}h ${minutes % 60}m`;
      return `${minutes}m`;
    }
    
    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    
    // Init
    loadData();
    connect();
  </script>
</body>
</html>
